<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Descuento 15%</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f0f2f5; }
        .ticket { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; margin: auto; }
        h2 { text-align: center; color: #333; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .recibo { margin-top: 20px; border-top: 2px dashed #bbb; padding-top: 15px; display: none; }
        .fila { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .total { font-weight: bold; font-size: 1.2em; color: #28a745; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="ticket">
        <h2>TECCEN - Ventas</h2>
        
        <div class="campo">
            <label>Precio del Producto:</label>
            <input type="number" id="precio" placeholder="S/ 0.00">
        </div>
        
        <div class="campo">
            <label>Cantidad:</label>
            <input type="number" id="cantidad" placeholder="0">
        </div>
        
        <button onclick="generarVenta()">Calcular Descuento</button>

        <div class="recibo" id="reciboVenta">
            <div class="fila"><span>Subtotal:</span> <span id="resSubtotal"></span></div>
            <div class="fila"><span>Descuento (15%):</span> <span id="resDescuento" style="color: #d9534f;"></span></div>
            <div class="fila total"><span>Monto Final:</span> <span id="resTotal"></span></div>
        </div>
    </div>

    <script>
        function generarVenta() {
 
            const inputPrecio = document.getElementById('precio').value;
            const inputCantidad = document.getElementById('cantidad').value;

        
            const precio = Number(inputPrecio);
            const cantidad = Number(inputCantidad);

            
            const subtotal = precio * cantidad;
            const descuento = subtotal * 0.15; 
            const montoFinal = subtotal - descuento;

         
            document.getElementById('resSubtotal').innerText = "S/ " + subtotal.toFixed(2);
            document.getElementById('resDescuento').innerText = "- S/ " + descuento.toFixed(2);
            document.getElementById('resTotal').innerText = "S/ " + montoFinal.toFixed(2);
            
            document.getElementById('reciboVenta').style.display = 'block';
        }
    </script>

</body>
</html>
