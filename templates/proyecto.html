<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Video Hub Premium</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            color: white; 
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor para los videos: aquí se alinean los 3 cuadros */
        .video-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            width: 100%;
            max-width: 1200px; /* Evita que se estiren demasiado en pantallas grandes */
        }

        .video-card { 
            background: #0f3460; 
            padding: 20px; 
            border-radius: 15px; 
            width: 350px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px rgba(0, 123, 255, 0.2);
            border: 1px solid #16213e;
            transition: transform 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
        }

        .video-container {
            width: 100%;
            height: 200px;
            background: black;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        .comment-list { 
            height: 120px; 
            overflow-y: auto; 
            background: rgba(255, 255, 255, 0.05); 
            margin: 15px 0; 
            padding: 10px; 
            font-size: 0.9em;
            border-radius: 8px;
            border-left: 3px solid #e94560;
        }

        .comment-item { 
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            padding: 8px; 
            border-radius: 5px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-group { display: flex; gap: 5px; }

        input, textarea { 
            padding: 10px; 
            border-radius: 5px; 
            border: none; 
            background: #1a1a2e;
            color: white;
            outline: none;
        }

        button { 
            cursor: pointer; 
            background: #e94560; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background: #ff2e63; }

        /* Estilo para el formulario de contacto al final */
        .hire-section {
            width: 100%;
            max-width: 730px;
            margin-top: 60px;
            background: #0f3460;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #00d1ff;
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.2);
        }

        .comment-list::-webkit-scrollbar { width: 5px; }
        .comment-list::-webkit-scrollbar-thumb { background: #e94560; border-radius: 100px; }
    </style>
</head>
<body>

    <div class="video-grid">
        <div class="video-card">
            <div class="video-container">
                <video src="Agent_video_Pippit_20260430005159.mp4" controls></video>
            </div>
            <div id="list-1" class="comment-list"></div>
            <div class="input-group">
                <input type="text" id="input-1" placeholder="¿Qué opinas?">
                <button onclick="saveComment(1)">Enviar</button>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container">
                <video src="Agent_video_Pippit_20260430013741.mp4" controls></video>
            </div>
            <div id="list-2" class="comment-list"></div>
            <div class="input-group">
                <input type="text" id="input-2" placeholder="¿Qué opinas?">
                <button onclick="saveComment(2)">Enviar</button>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container">
                <video src="video_1_1777483848616.mp4" controls></video>
            </div>
            <div id="list-3" class="comment-list"></div>
            <div class="input-group">
                <input type="text" id="input-3" placeholder="¿Qué opinas?">
                <button onclick="saveComment(3)">Enviar</button>
            </div>
        </div>
    </div>

    <div class="hire-section">
        <h3 style="text-align: center; color: #00d1ff; margin-top: 0;">🚀 ¿Quieres contratarme?</h3>
        <p style="text-align: center; font-size: 0.9em; margin-bottom: 20px;">Deja tus datos y me pondré en contacto contigo.</p>
        
        <form id="hireForm" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="hireName" placeholder="Tu Nombre Completo" required>
            <input type="email" id="hireEmail" placeholder="Tu Correo Electrónico" required>
            <textarea id="hireProject" placeholder="Cuéntame sobre tu proyecto..." style="height: 80px;"></textarea>
            <button type="button" onclick="registerHire()" style="background: #00d1ff; color: #1a1a2e;">Enviar Solicitud</button>
        </form>
        <div id="hireStatus" style="margin-top: 15px; text-align: center; font-size: 0.9em; color: #00ff88;"></div>
    </div>

    <script>
        window.onload = () => {
            [1, 2, 3].forEach(id => displayComments(id));
        };

        function saveComment(id) {
            const text = document.getElementById(`input-${id}`).value;
            if (!text.trim()) return;

            let comments = JSON.parse(localStorage.getItem(`video-${id}`)) || [];
            comments.push(text);
            localStorage.setItem(`video-${id}`, JSON.stringify(comments));
            
            document.getElementById(`input-${id}`).value = "";
            displayComments(id);
        }

        function displayComments(id) {
            const listDiv = document.getElementById(`list-${id}`);
            let comments = JSON.parse(localStorage.getItem(`video-${id}`)) || [];
            listDiv.innerHTML = comments.map(c => `<div class="comment-item">${c}</div>`).reverse().join('');
        }

        function registerHire() {
            const name = document.getElementById('hireName').value;
            const email = document.getElementById('hireEmail').value;
            const project = document.getElementById('hireProject').value;

            if(!name || !email) return alert("Por favor, llena los campos básicos.");

            const registration = { name, email, project, date: new Date().toLocaleString() };
            let hires = JSON.parse(localStorage.getItem('registros_contratacion')) || [];
            hires.push(registration);
            localStorage.setItem('registros_contratacion', JSON.stringify(hires));

            document.getElementById('hireForm').reset();
            document.getElementById('hireStatus').innerText = "✅ ¡Datos registrados exitosamente!";
        }
    </script>
</body>
</html>
